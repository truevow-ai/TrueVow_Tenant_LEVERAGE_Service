# Alembic configuration file for TrueVow DRAFT Service

[alembic]
# Path to migration scripts
script_location = database/migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone to use when rendering the date within the migration file
timezone =

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the versions/ directory
sourceless = false

# Version location specification
version_locations = %(here)s/database/migrations/versions

# Version path separator; As mentioned above, this is the character used to split
# version_locations. The default value is an operating system dependent separator (":" for Unix and ";" for Windows).
version_path_separator = os

# The output encoding used when revision files are written from string.encode()
output_encoding = utf-8

# Database URL (override with environment variable)
sqlalchemy.url = postgresql://postgres:password@localhost:5432/truevow_draft


[post_write_hooks]
# Post-write hooks are used to format generated files
# Format with black
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

