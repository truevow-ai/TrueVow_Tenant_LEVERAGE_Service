<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueVow DRAFT™</title>
    
    <!-- Office.js -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css"/>
    <link rel="stylesheet" href="taskpane.css">
</head>
<body class="ms-Fabric">
    <div class="container">
        
        <!-- Header -->
        <header class="header">
            <h1 class="ms-font-xl">TrueVow DRAFT™</h1>
            <p class="ms-font-s subtitle">Document Compliance Validator</p>
        </header>

        <!-- Sync Status -->
        <div class="sync-status" id="syncStatus">
            <div class="status-row">
                <span class="status-indicator" id="statusIndicator"></span>
                <span class="status-text" id="statusText">Not synced</span>
            </div>
            <button class="ms-Button ms-Button--primary btn-sync" id="syncButton">
                <span class="ms-Button-label">Sync Rules</span>
            </button>
        </div>

        <!-- Validation Section -->
        <section class="validation-section">
            <h2 class="ms-font-l section-title">Document Validation</h2>
            
            <!-- Document Info -->
            <div class="info-box" id="documentInfo">
                <p class="ms-font-s">Open document detected</p>
                <p class="ms-font-xs" id="wordCount">Loading...</p>
            </div>

            <!-- Validation Options -->
            <div class="form-group">
                <label class="ms-Label">Practice Area:</label>
                <select id="practiceArea" class="ms-Dropdown">
                    <option value="">Select...</option>
                    <option value="personal_injury">Personal Injury</option>
                    <option value="family_law">Family Law</option>
                    <option value="criminal_law">Criminal Law</option>
                    <option value="corporate_law">Corporate Law</option>
                    <option value="immigration_law">Immigration Law</option>
                </select>
            </div>

            <div class="form-group">
                <label class="ms-Label">Specialization:</label>
                <select id="specialization" class="ms-Dropdown">
                    <option value="">Select...</option>
                </select>
            </div>

            <div class="form-group">
                <label class="ms-Label">Document Type:</label>
                <select id="documentType" class="ms-Dropdown">
                    <option value="">Select...</option>
                    <option value="demand_letter">Demand Letter</option>
                    <option value="pleading">Pleading</option>
                    <option value="contract">Contract</option>
                    <option value="discovery">Discovery</option>
                    <option value="motion">Motion</option>
                </select>
            </div>

            <div class="form-group">
                <label class="ms-Label">Jurisdiction:</label>
                <select id="jurisdiction" class="ms-Dropdown">
                    <option value="">Select...</option>
                    <option value="AZ">Arizona</option>
                    <option value="CA">California</option>
                    <option value="NY">New York</option>
                    <option value="TX">Texas</option>
                    <option value="FL">Florida</option>
                </select>
            </div>

            <!-- Validate Button -->
            <button class="ms-Button ms-Button--primary btn-validate" id="validateButton" disabled>
                <span class="ms-Button-label">Validate Document</span>
            </button>
        </section>

        <!-- Results Section -->
        <section class="results-section" id="resultsSection" style="display: none;">
            <h2 class="ms-font-l section-title">Validation Results</h2>
            
            <div class="results-summary" id="resultsSummary"></div>
            
            <div class="results-details" id="resultsDetails"></div>
        </section>

        <!-- Settings Section -->
        <section class="settings-section" id="settingsSection" style="display: none;">
            <h2 class="ms-font-l section-title">Settings</h2>
            
            <div class="form-group">
                <label class="ms-Label">API URL:</label>
                <input type="url" id="apiUrl" class="ms-TextField-field" placeholder="http://localhost:8000/api/v1">
            </div>

            <div class="form-group">
                <label class="ms-Label">API Key:</label>
                <input type="password" id="apiKey" class="ms-TextField-field" placeholder="Enter your API key">
            </div>

            <button class="ms-Button ms-Button--primary" id="saveSettingsButton">
                <span class="ms-Button-label">Save Settings</span>
            </button>

            <button class="ms-Button" id="backButton">
                <span class="ms-Button-label">Back</span>
            </button>
        </section>

        <!-- Zero-Knowledge Notice -->
        <div class="zero-knowledge-notice">
            <div class="lock-icon">🔒</div>
            <div class="notice-text">
                <strong>Zero-Knowledge Validation</strong>
                <p class="ms-font-xs">Your document is processed locally. Content never leaves Word.</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <button class="link-button" id="settingsLink">Settings</button>
            <span class="ms-font-xs version">v1.0.0</span>
        </footer>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay" style="display: none;">
            <div class="ms-Spinner ms-Spinner--large"></div>
            <p class="ms-font-m" id="loadingText">Processing...</p>
        </div>

    </div>

    <!-- Scripts -->
    <script src="validation_engine.js"></script>
    <script src="taskpane.js"></script>
</body>
</html>
