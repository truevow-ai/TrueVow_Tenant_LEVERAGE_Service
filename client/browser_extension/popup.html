<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueVow DRAFT™ Validator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="popup-container">
        <!-- Header -->
        <div class="header">
            <h1>TrueVow DRAFT™</h1>
            <p class="subtitle">Document Compliance Validator</p>
        </div>

        <!-- Sync Status -->
        <div class="sync-status" id="syncStatus">
            <div class="status-indicator" id="statusIndicator"></div>
            <div class="status-text">
                <span id="statusText">Checking sync status...</span>
                <span id="lastSync" class="last-sync"></span>
            </div>
            <button id="syncButton" class="btn-sync">Sync Rules</button>
        </div>

        <!-- Validation Section -->
        <div class="validation-section">
            <h2>Document Validation</h2>
            
            <!-- Document Type Selection -->
            <div class="form-group">
                <label for="practiceArea">Practice Area:</label>
                <select id="practiceArea" class="form-control">
                    <option value="">Select...</option>
                    <option value="personal_injury">Personal Injury</option>
                    <option value="family_law">Family Law</option>
                    <option value="criminal_law">Criminal Law</option>
                    <option value="corporate_law">Corporate Law</option>
                    <option value="immigration_law">Immigration Law</option>
                </select>
            </div>

            <div class="form-group">
                <label for="specialization">Specialization:</label>
                <select id="specialization" class="form-control">
                    <option value="">Select...</option>
                    <!-- Dynamically populated based on practice area -->
                </select>
            </div>

            <div class="form-group">
                <label for="documentType">Document Type:</label>
                <select id="documentType" class="form-control">
                    <option value="">Select...</option>
                    <option value="demand_letter">Demand Letter</option>
                    <option value="pleading">Pleading</option>
                    <option value="contract">Contract</option>
                    <option value="discovery">Discovery</option>
                    <option value="motion">Motion</option>
                </select>
            </div>

            <div class="form-group">
                <label for="jurisdiction">Jurisdiction (State):</label>
                <select id="jurisdiction" class="form-control">
                    <option value="">Select...</option>
                    <option value="AZ">Arizona</option>
                    <option value="CA">California</option>
                    <option value="NY">New York</option>
                    <option value="TX">Texas</option>
                    <option value="FL">Florida</option>
                    <!-- Add all states -->
                </select>
            </div>

            <!-- Validate Button -->
            <button id="validateButton" class="btn-primary" disabled>
                Validate Document
            </button>
        </div>

        <!-- Validation Results -->
        <div class="validation-results" id="validationResults" style="display: none;">
            <h3>Validation Results</h3>
            <div id="resultsContent"></div>
        </div>

        <!-- Zero-Knowledge Notice -->
        <div class="zero-knowledge-notice">
            <div class="lock-icon">🔒</div>
            <p>
                <strong>Zero-Knowledge Validation</strong><br>
                Your document never leaves your device. Validation happens locally.
            </p>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="options.html" target="_blank">Settings</a>
            <span class="version">v1.0.0</span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
